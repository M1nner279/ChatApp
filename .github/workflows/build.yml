name: Build and Publish Artifacts

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Publish for Windows
        run: dotnet publish -c Release -r win-x64 --self-contained false -o published

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ChatApp-windows
          path: published

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Publish for Linux
        run: dotnet publish -c Release -r linux-x64 --self-contained false -o published

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ChatApp-linux
          path: published
